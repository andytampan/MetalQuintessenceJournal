Name: Multi-Use Process
ID: mqj-multi-use-process
Author: 'Airy, H'
Inputs:
- Molecule:
    Atoms:
    - AtomType: MetalQuintessence:chromium
      Position:
        Pos: 0,0
    Bonds: []
    Name: Elemental Chromium
  AmountOverride: 0
Outputs:
- Molecule:
    Atoms:
    - AtomType: lead
      Position:
        Pos: -1,0
    - AtomType: copper
      Position:
        Pos: 0,0
    Bonds:
    - A:
        Pos: -1,0
      B:
        Pos: 0,0
      BondTypes:
      - standard
    Name: Leaded Copper
  AmountOverride: 0
- Molecule:
    Atoms:
    - AtomType: tin
      Position:
        Pos: -1,0
    - AtomType: silver
      Position:
        Pos: 0,0
    Bonds:
    - A:
        Pos: -1,0
      B:
        Pos: 0,0
      BondTypes:
      - standard
    Name: Lead-Free Solder
  AmountOverride: 0
- Molecule:
    Atoms:
    - AtomType: gold
      Position:
        Pos: 0,0
    - AtomType: iron
      Position:
        Pos: -1,0
    Bonds:
    - A:
        Pos: -1,0
      B:
        Pos: 0,0
      BondTypes:
      - standard
    Name: Colored Gold
  AmountOverride: 0
OutputMultiplier: 1
PermissionFlags: Disposal, CoreTools
CustomPermissions:
- MetalQuintessence:ChromaDispersionPermission
Highlights: []
ProductionInfo: 
